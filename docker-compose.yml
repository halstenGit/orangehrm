###############################################
# OrangeHRM - Halsten Local Development Stack
# Usage:
#   cp .env.example .env
#   docker compose up -d
#   Acesse http://localhost:8080
###############################################

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ohrm-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      - OHRM_DB_HOST=${OHRM_DB_HOST:-db}
      - OHRM_DB_PORT=${OHRM_DB_PORT:-3306}
      - OHRM_DB_NAME=${OHRM_DB_NAME:-orangehrm}
      - OHRM_DB_USER=${OHRM_DB_USER:-orangehrm}
      - OHRM_DB_PASSWORD=${OHRM_DB_PASSWORD:-ohrm_secret_2026}
      - APP_PORT=${APP_PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ohrm-net

  db:
    image: mysql:8.0
    container_name: ohrm-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ohrm_root_2026}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-orangehrm}
      - MYSQL_USER=${MYSQL_USER:-orangehrm}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ohrm_secret_2026}
    volumes:
      - ohrm-db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ohrm_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ohrm-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ohrm-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ohrm_root_2026}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ohrm-net

volumes:
  ohrm-db-data:
    driver: local

networks:
  ohrm-net:
    driver: bridge
